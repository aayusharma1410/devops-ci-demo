name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Files
        run: ls -la

      - name: System Info
        run: |
          echo "Runner Information"
          uname -a
          date

      - name: Build Docker Image
        run: docker build -t devops-demo .

      - name: Show Docker Images
        run: docker images
